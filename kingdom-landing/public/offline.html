<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom AI — Offline</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0E17;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .offline-icon { font-size: 72px; margin-bottom: 24px; }
        h1 { color: #FFD700; font-size: 28px; margin-bottom: 12px; }
        p { color: #999; font-size: 16px; line-height: 1.6; max-width: 400px; margin-bottom: 24px; }
        .retry-btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #0A0E17;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .retry-btn:active { transform: scale(0.97); }
        .status { color: #666; font-size: 12px; margin-top: 32px; }
    </style>
</head>
<body>
    <div class="offline-icon">👑</div>
    <h1>You're Offline</h1>
    <p>Kingdom AI needs an internet connection to load. Please check your Wi-Fi or cellular data and try again.</p>
    <button class="retry-btn" onclick="location.reload()">Try Again</button>
    <p class="status">Kingdom AI · kingdom-ai.netlify.app</p>
</body>
</html>
